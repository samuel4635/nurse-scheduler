<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>護理師排班系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;font-size:14px;background:#f5f5f5;color:#222;padding:1.5rem;}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem;color:#333;}
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:1rem;}
select{height:36px;padding:0 10px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:14px;}
button{height:36px;padding:0 16px;border-radius:8px;border:1px solid #ccc;background:#fff;cursor:pointer;font-size:14px;}
button:hover{background:#f0f0f0;}
button.primary{background:#1a73e8;border-color:#1a73e8;color:#fff;}
button.primary:hover{background:#1558b0;}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.5rem;}
@media(max-width:600px){.stats{grid-template-columns:repeat(3,1fr);}}
.stat{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px;text-align:center;}
.stat-name{font-size:18px;font-weight:600;margin-bottom:6px;color:#1a73e8;}
.stat-row{font-size:12px;color:#666;margin-bottom:2px;}
.stat-total{font-size:13px;font-weight:500;margin-top:4px;color:#333;}
.calendar{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;}
th{background:#f8f8f8;padding:8px 4px;text-align:center;border:1px solid #e0e0e0;font-weight:500;color:#555;}
td{padding:4px;border:1px solid #e0e0e0;vertical-align:top;min-width:90px;}
.day-num{font-size:11px;color:#999;margin-bottom:3px;}
.shift{font-size:11px;border-radius:4px;padding:2px 5px;margin-bottom:2px;}
.sh-M{background:#e6f4ea;color:#1e7e34;}
.sh-A{background:#fff8e1;color:#b45309;}
.sh-E{background:#e8f0fe;color:#1558b0;}
.status{font-size:13px;color:#666;margin-left:4px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">
function exportExcel() {
  const y = +selYear.value, m = +selMonth.value;
  const days = getDays(y, m);

  // 標題列
  const headers = ['日期', '星期', '診別', '護理師1', '護理師2'];
  const rows = [headers];

  const dayNames = ['日','一','二','三','四','五','六'];
  const shiftLabel = {M:'早診', A:'午診', E:'晚診'};

  for (let d = 1; d <= days; d++) {
    if (!schedule[d]) continue;
    const date = `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
    const dayOfWeek = dayNames[new Date(y, m-1, d).getDay()];

    for (const shift of ['M','A','E']) {
      const arr = schedule[d][shift] || [];
      if (arr.length === 0) continue;
      rows.push([
        date,
        dayOfWeek,
        shiftLabel[shift],
        arr[0] || '',
        arr[1] || ''
      ]);
    }
  }

  // 建立 Excel
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 設定欄寬
  ws['!cols'] = [
    {wch:12}, // 日期
    {wch:6},  // 星期
    {wch:8},  // 診別
    {wch:10}, // 護理師1
    {wch:10}, // 護理師2
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${y}年${m}月班表`);
  XLSX.writeFile(wb, `護理師班表_${y}年${m}月.xlsx`);
}

</script>
</head>
<body>
<h1>護理師排班系統</h1>

<div class="toolbar">
  <select id="selYear"></select>
  <select id="selMonth"></select>
  <button class="primary" onclick="autoSchedule()">自動排班</button>
  <button onclick="clearSchedule()">清除</button>
  <button onclick="exportExcel()">📥 匯出 Excel</button>
  <span class="status" id="statusMsg"></span>
</div>

<div class="stats" id="statsBox"></div>
<div class="calendar"><table id="calTable"></table></div>

<script>
const NURSES=['A','B','C','D','E'];
const SHIFTS=['M','A','E'];
const SHIFT_LABEL={M:'早診',A:'午診',E:'晚診'};
const SHIFT_HRS={M:4,A:3,E:3.5};
const DAYS_TW=['日','一','二','三','四','五','六'];

let schedule={};

const selYear=document.getElementById('selYear');
const selMonth=document.getElementById('selMonth');
const now=new Date();
for(let y=now.getFullYear()-1;y<=now.getFullYear()+2;y++){
  const o=document.createElement('option');
  o.value=y;o.text=y+'年';
  if(y===now.getFullYear())o.selected=true;
  selYear.appendChild(o);
}
for(let m=1;m<=12;m++){
  const o=document.createElement('option');
  o.value=m;o.text=m+'月';
  if(m===now.getMonth()+1)o.selected=true;
  selMonth.appendChild(o);
}
selYear.onchange=selMonth.onchange=()=>{schedule={};renderCalendar();};

function getDays(y,m){return new Date(y,m,0).getDate();}
function getFirst(y,m){return new Date(y,m-1,1).getDay();}

function autoSchedule(){
  const y=+selYear.value,m=+selMonth.value;
  const days=getDays(y,m);
  schedule={};
  const cnt=Object.fromEntries(NURSES.map(n=>[n,{M:0,A:0,E:0,total:0}]));

  for(let d=1;d<=days;d++){
    schedule[d]={M:[],A:[],E:[]};
    for(const shift of SHIFTS){
      const sorted=[...NURSES].sort((a,b)=>{
        if(cnt[a].total!==cnt[b].total) return cnt[a].total-cnt[b].total;
        return cnt[a][shift]-cnt[b][shift];
      });
      const assigned=[];
      for(const n of sorted){
        if(assigned.length>=2) break;
        const hasMorning=schedule[d]['M'].includes(n);
        const hasAfternoon=schedule[d]['A'].includes(n);
        const hasEvening=schedule[d]['E'].includes(n);
        if(shift==='A'&&(hasMorning||hasEvening)) continue;
        if(shift==='E'&&hasAfternoon) continue;
        if(shift==='M'&&hasAfternoon) continue;
        const todayShifts=SHIFTS.filter(s=>schedule[d][s].includes(n)).length;
        if(todayShifts>=2) continue;
        assigned.push(n);
        cnt[n][shift]++;
        cnt[n].total++;
      }
      schedule[d][shift]=assigned;
    }
  }
  renderCalendar();
  document.getElementById('statusMsg').textContent='排班完成';
}

function clearSchedule(){schedule={};renderCalendar();document.getElementById('statusMsg').textContent='';}

function renderCalendar(){
  const y=+selYear.value,m=+selMonth.value;
  const days=getDays(y,m);
  const cnt=Object.fromEntries(NURSES.map(n=>[n,{M:0,A:0,E:0,hrs:0}]));
  for(let d=1;d<=days;d++){
    if(!schedule[d]) continue;
    for(const s of SHIFTS){
      (schedule[d][s]||[]).forEach(n=>{cnt[n][s]++;cnt[n].hrs+=SHIFT_HRS[s];});
    }
  }

  document.getElementById('statsBox').innerHTML=NURSES.map(n=>`
    <div class="stat">
      <div class="stat-name">${n}</div>
      <div class="stat-row">早 ${cnt[n].M} 次</div>
      <div class="stat-row">午 ${cnt[n].A} 次</div>
      <div class="stat-row">晚 ${cnt[n].E} 次</div>
      <div class="stat-total">合計 ${cnt[n].M+cnt[n].A+cnt[n].E} 班 ／ ${cnt[n].hrs.toFixed(1)}h</div>
    </div>`).join('');

  const tbl=document.getElementById('calTable');
  let html='<tr>'+DAYS_TW.map(d=>`<th>${d}</th>`).join('')+'</tr>';
  let day=1;
  const first=getFirst(y,m);
  for(let cell=0;cell<42;cell++){
    if(cell%7===0) html+='<tr>';
    if(cell<first||day>days){
      html+='<td></td>';
    } else {
      const dd=schedule[day]||{};
      let inner=`<div class="day-num">${day}</div>`;
      for(const s of SHIFTS){
        const arr=dd[s]||[];
        if(arr.length) inner+=`<div class="shift sh-${s}">${SHIFT_LABEL[s]}：${arr.join('、')}</div>`;
      }
      html+=`<td>${inner}</td>`;
      day++;
    }
    if(cell%7===6) html+='</tr>';
    if(day>days&&cell%7===6) break;
  }
  tbl.innerHTML=html;
}

renderCalendar();

function exportExcel() {
  const y = +selYear.value, m = +selMonth.value;
  const days = getDays(y, m);

  // 標題列
  const headers = ['日期', '星期', '診別', '護理師1', '護理師2'];
  const rows = [headers];

  const dayNames = ['日','一','二','三','四','五','六'];
  const shiftLabel = {M:'早診', A:'午診', E:'晚診'};

  for (let d = 1; d <= days; d++) {
    if (!schedule[d]) continue;
    const date = `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
    const dayOfWeek = dayNames[new Date(y, m-1, d).getDay()];

    for (const shift of ['M','A','E']) {
      const arr = schedule[d][shift] || [];
      if (arr.length === 0) continue;
      rows.push([
        date,
        dayOfWeek,
        shiftLabel[shift],
        arr[0] || '',
        arr[1] || ''
      ]);
    }
  }

  // 建立 Excel
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 設定欄寬
  ws['!cols'] = [
    {wch:12}, // 日期
    {wch:6},  // 星期
    {wch:8},  // 診別
    {wch:10}, // 護理師1
    {wch:10}, // 護理師2
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${y}年${m}月班表`);
  XLSX.writeFile(wb, `護理師班表_${y}年${m}月.xlsx`);
}

</script>
</body>
</html>
